services:
  mysql:
    image: mysql:8.4
    container_name: chatapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - chatapp-mysql-data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: ChatApp.Api/Dockerfile
    container_name: chatapp-api
    depends_on:
      - mysql
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};"
    ports:
      - "${API_PORT}:8080"

volumes:
  chatapp-mysql-data: